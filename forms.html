<html>
<head>
  <title>Forms</title>
</head>
  <body>
    
    <table>
      <thead>
        <tr>
          <th scope="col">Planet</th>
          <th scope="col">Type</th>
          <th scope="col">Number of Moons</th>
          <th scope="col">Length of Day (Hours)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Mercury</td>
          <td rowspan="4">Terrestrial</td>
          <td>0</td>
          <td>1,408</td>
        </tr>
        <tr>
          <td>Venus</td>
          <td>0</td>
          <td>5,832</td>
        </tr>
        <tr>
          <td>Earth</td>
          <td>0</td>
          <td>24</td>
        </tr>
        <tr>
          <td>Mars</td>
          <td>2</td>
          <td>25</td>
        </tr>
        <tr>
          <td>Jupiter</td>
          <td rowspan="2">Gas Giant</td>
          <td>95</td>
          <td>10</td>
        </tr>
        <tr>
          <td>Saturn</td>
          <td>146</td>
          <td>11</td>
        </tr>
        <tr>
          <td>Uranus</td>
          <td rowspan="2">Ice Giant</td>
          <td>28</td>
          <td>17</td>
        </tr>
        <tr>
          <td>Neptune</td>
          <td>16</td>
          <td>16</td>
        </tr>
        <tr>
          <td>Pluto</td>
          <td>Dwarf Planet</td>
          <td>5</td>
          <td>153</td>
        </tr>
      </tbody>
    </table>

    <form action="https://www.example.com/review.php" method="post">
      <fieldset>
        <legend>Let's Hear from You!</legend>
        <label>Name:<input type="text" name="name" /></label>
        <br />
        <p>
          <label for="favorite">Which planet is your favorite? Why?</label>
          <br />
          <textarea rows="4" cols="40" name="favorite">Write your answer here</textarea>
        </p>
        <br />
        <p>
          <label for="website">What is your favorite place to learn about space?</label>
          <input type="url" name="website" />
        </p>
        <br />
        <p>
          <label for="picture">Upload a picture of space that you love</label>
          <input type="file" name="picture" />
        </p>
        <br />
        <label for="submit"><input type="submit" name="submit" value="Submit" /></label>
      </fieldset>
    </form>
    
  </body>
</html>
